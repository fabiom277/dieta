<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NutriPlan Admin - Gestione Ricette</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css?v=2.3">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .admin-container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 5%;
        }
        .recipe-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
            margin-top: 2rem;
        }
        .recipe-card-admin {
            background: var(--bg-card);
            border: 1px solid var(--glass-border);
            border-radius: var(--border-radius-lg);
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            animation: fadeIn 0.4s ease forwards;
            transition: transform 0.2s;
        }
        .recipe-card-admin:hover {
            transform: translateY(-4px);
            border-color: var(--accent-primary);
        }
        .recipe-card-admin img {
            width: 100%;
            height: 150px;
            object-fit: cover;
            border-radius: var(--border-radius-md);
        }
        .recipe-info h3 {
            margin: 0.5rem 0;
            font-size: 1.1rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .recipe-actions {
            display: flex;
            gap: 0.5rem;
            margin-top: auto;
        }
        .search-bar {
            margin-bottom: 2rem;
            display: flex;
            gap: 1rem;
            background: rgba(255,255,255,0.03);
            padding: 1rem;
            border-radius: 16px;
            border: 1px solid var(--glass-border);
        }
        .search-bar input {
            flex: 1;
        }
        .editor-modal {
            max-width: 800px !important;
        }
        .editor-form {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }
        .editor-form .full-width {
            grid-column: 1 / -1;
        }
        textarea {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--glass-border);
            color: var(--text-primary);
            padding: 0.75rem 1rem;
            border-radius: var(--border-radius-md);
            font-family: monospace;
            font-size: 0.85rem;
            resize: vertical;
            min-height: 120px;
        }
        textarea:focus {
            border-color: var(--accent-primary);
            outline: none;
        }
    </style>
</head>
<body>
    <header>
        <div class="header-container">
            <div class="logo">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
                <h1>NutriPlan Admin</h1>
            </div>
            <nav id="main-nav" style="display: flex; align-items: center; gap: 1rem;">
                <a href="index.html" class="btn-small" style="text-decoration: none; display: flex; align-items: center; gap: 0.5rem;">🏠 Torna all'App</a>
                <button id="btn-logout-admin" class="btn-small" style="color: #f87171; border-color: rgba(239,68,68,0.2);">Esci</button>
            </nav>
        </div>
    </header>

    <main class="admin-container">
        <!-- Auth View -->
        <div id="admin-auth-view" class="glass-panel text-center" style="max-width: 400px; margin: 5rem auto;">
            <h2>Accesso Admin</h2>
            <p class="text-muted">Effettua il login per gestire le ricette.</p>
            <form id="admin-login-form" style="margin-top: 1.5rem;">
                <div class="form-group">
                    <input type="email" id="admin-email" placeholder="Email Admin" required>
                </div>
                <div class="form-group" style="margin-top: 1rem;">
                    <input type="password" id="admin-password" placeholder="Password" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1.5rem;">Accedi</button>
                <p id="admin-auth-error" style="display:none; background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); color: #f87171; padding: 0.75rem; border-radius: 8px; margin-top: 1rem; font-size: 0.9rem;"></p>
            </form>
        </div>

        <!-- Content View -->
        <div id="admin-content-view" class="hidden">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
                <div>
                    <h2 style="font-size: 1.8rem;">Database Ricette</h2>
                    <p class="text-muted" id="recipe-count">Caricamento...</p>
                </div>
                <button id="btn-add-recipe" class="btn btn-primary">+ Aggiungi Ricetta</button>
            </div>

            <div class="search-bar">
                <input type="text" id="recipe-search" placeholder="Cerca per nome, ingrediente o fonte...">
                <select id="filter-type">
                    <option value="all">Tutti i tipi</option>
                    <option value="breakfast">Colazione</option>
                    <option value="lunch">Pranzo/Cena</option>
                    <option value="snack">Spuntino</option>
                </select>
            </div>

            <div id="recipe-list" class="recipe-list">
                <!-- Ricette caricate qui -->
            </div>
        </div>
    </main>

    <!-- Editor Modal -->
    <div id="editor-modal" class="modal hidden">
        <div class="modal-content editor-modal">
            <button class="close-modal" id="btn-close-editor">&times;</button>
            <div style="padding: 2.5rem;">
                <h2 id="editor-title" style="margin-bottom: 2rem; color: var(--accent-primary);">Modifica Ricetta</h2>
                <form id="recipe-editor-form" class="editor-form">
                    <input type="hidden" id="edit-id">
                    
                    <div class="form-group full-width">
                        <label>Nome Ricetta</label>
                        <input type="text" id="edit-name" required placeholder="Es: Pasta al Pomodoro Fresco">
                    </div>

                    <div class="form-group">
                        <label>Tipo di Pasto</label>
                        <select id="edit-type" required>
                            <option value="breakfast">Colazione</option>
                            <option value="lunch">Pranzo/Cena</option>
                            <option value="snack">Spuntino</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Calorie Base (per porzione)</label>
                        <input type="number" id="edit-calories" required>
                    </div>

                    <div class="form-group full-width">
                        <label>Immagine URL (Unsplash o simile)</label>
                        <input type="url" id="edit-image-url" placeholder="https://images.unsplash.com/...">
                    </div>

                    <div class="form-group full-width">
                        <label>Sorgente URL (Link ricetta originale)</label>
                        <input type="url" id="edit-source-url" placeholder="https://www.giallozafferano.it/...">
                    </div>

                    <div class="form-group full-width">
                        <label>Ingredienti (Formato JSON)</label>
                        <textarea id="edit-ingredients" required></textarea>
                    </div>

                    <div class="form-group full-width">
                        <label>Istruzioni (Formato JSON)</label>
                        <textarea id="edit-instructions" required></textarea>
                    </div>

                    <div class="form-group full-width">
                        <label>Macro Nutrienti (JSON)</label>
                        <input type="text" id="edit-macros" required placeholder='{"protein": 20, "carbs": 50, "fat": 15}'>
                    </div>

                    <div class="form-actions full-width" style="display: flex; gap: 1rem; margin-top: 2rem; padding-top: 1.5rem; border-top: 1px solid var(--glass-border);">
                        <button type="submit" class="btn btn-primary" style="flex: 2;">💾 Salva Ricetta</button>
                        <button type="button" id="btn-delete-recipe" class="btn" style="flex: 1; background: rgba(239,68,68,0.15); color: #f87171;">🗑️ Elimina</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="js/supabase-client.js"></script>
    <script src="js/admin.js?v=2.3"></script>
</body>
</html>
